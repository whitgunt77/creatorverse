<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" role="img" aria-labelledby="title desc">
  <title id="title">Creatorverse stacked logo</title>
  <desc id="desc">A stacked Creatorverse logo with icon above the wordmark.</desc>

  <defs>
    <linearGradient id="creatorverse-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2EFF"></stop>
      <stop offset="50%" stop-color="#00FFA3"></stop>
      <stop offset="100%" stop-color="#FF2D95"></stop>
    </linearGradient>

    <filter id="icon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon -->
  <g transform="translate(100 12)">
    <rect x="0" y="0" width="120" height="120" rx="32" fill="#0A1128"></rect>

    <path d="M60 26
         L67 45
         L86 52
         L67 59
         L60 78
         L53 59
         L34 52
         L53 45 Z" fill="url(#creatorverse-gradient)" filter="url(#icon-glow)"></path>

    <circle cx="60" cy="52" r="4.5" fill="#FFFFFF"></circle>
  </g>

  <!-- Wordmark -->
  <g transform="translate(160 170)">
    <text x="0" y="0" text-anchor="middle" font-family="Avenir Next, Trebuchet MS, Segoe UI, sans-serif" font-size="34" font-weight="800" fill="#FFFFFF">
      Creator<tspan fill="#00FFA3">verse</tspan>
    </text>

    <text x="0" y="30" text-anchor="middle" font-family="Avenir Next, Trebuchet MS, Segoe UI, sans-serif" font-size="11" font-weight="700" letter-spacing="3" fill="#E0BBFF">
      CREATOR PLATFORM
    </text>
  </g>
</svg>