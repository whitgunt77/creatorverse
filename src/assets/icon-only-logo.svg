<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="title desc">
  <title id="title">Creatorverse icon</title>
  <desc id="desc">A spark icon inside a rounded square for the Creatorverse brand.</desc>

  <defs>
    <linearGradient id="creatorverse-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B2EFF"></stop>
      <stop offset="50%" stop-color="#00FFA3"></stop>
      <stop offset="100%" stop-color="#FF2D95"></stop>
    </linearGradient>

    <filter id="icon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="104" height="104" rx="28" fill="#0A1128"></rect>

  <path d="M60 26
       L67 45
       L86 52
       L67 59
       L60 78
       L53 59
       L34 52
       L53 45 Z" fill="url(#creatorverse-gradient)" filter="url(#icon-glow)"></path>

  <circle cx="60" cy="52" r="4.5" fill="#FFFFFF"></circle>
</svg>